<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FinLogger - Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="style.css" rel="stylesheet" />
</head>
<body>

    <header class="header container-fluid py-3 px-4">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h1 class="app-title m-0">FinLogger</h1>
            </div>
            <div class="col-md-6 text-md-end">
                <span class="tagline">Your financial diary!</span>
            </div>
        </div>
    </header>

    <main class="container-lg my-4">
        
        <div class="row align-items-center mb-4">
            <div class="col-md-6">
                <h2 class="fw-bold m-0">OVERVIEW</h2>
            </div>
            <div class="col-md-6 d-flex justify-content-md-end gap-3 mt-3 mt-md-0">
                <input type="month" id="monthFilter" class="form-control w-auto" value="2020-01"/>
                <button type="button" class="btn btn-primary float-end expButton" data-mode="add" data-bs-toggle="modal" data-bs-target="#expenseModal">Add Expense</button>
            </div>
        </div>

        <section class="row g-3 mb-5">
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="me-3">
                                <img src="./images/spending.png" alt="Expenses" class="card-icon"/>
                            </div>
                            <div>
                                <p class="card-text text-muted mb-1">Expenses</p>
                                <h5 class="card-title fw-bold m-0" id="totalExpenses"></h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="me-3">
                                <img src="./images/income.png" alt="Income" class="card-icon"/>
                            </div>
                            <div>
                                <p class="card-text text-muted mb-1">Monthly Income</p>
                                <h5 class="card-title fw-bold m-0" id="income"></h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center">
                            <div class="me-3">
                                <img src="./images/balance.png" alt="Balance" class="card-icon"/>
                            </div>
                            <div>
                                <p class="card-text text-muted mb-1">Balance</p>
                                <h5 class="card-title fw-bold m-0" id="balance"></h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="row g-4">
            <section class="col-md-4">
                <h4 class="fw-bold mb-3" style="font-size: 1.1rem;">Expense Summary</h4>
                <table id="expense-summary" class="table table-striped table-hover border align-middle">
                    <thead>
                        <tr>
                            <th>EXPENSE CATEGORY</th>
                            <th class="text-end">%</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>

            <section class="col-md-8">
                <h4 class="fw-bold mb-3" style="font-size: 1.1rem;">Expense Details</h4>
                <table id="expenseTable" class="table table-striped table-hover border align-middle">
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>DESCRIPTION</th>
                            <th>AMOUNT</th>
                            <th class="text-end">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </div>
    </main>

    <div class="modal fade" id="expenseModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Add Expense</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="expenseForm">
                        <div class="form-group mb-3">
                            <label for="date" class="form-label fw-semibold">Date</label>
                            <input type="date" class="form-control" id="date"/>
                        </div>
                        <div class="form-group mb-3">
                            <label for="category" class="form-label fw-semibold">Category</label>
                            <select class="form-control form-select" id="category">
                                <option value="">--Select Category--</option>
                            </select>
                        </div>
                        <div class="form-group mb-3">
                            <label for="description" class="form-label fw-semibold">Description</label>
                            <input type="text" class="form-control" id="description" placeholder="Enter description"/>
                        </div>
                        <div class="form-group mb-3">
                            <label for="amount" class="form-label fw-semibold">Amount</label>
                            <input type="number" class="form-control" id="amount" placeholder="Enter amount"/>
                        </div>
                        <div class="modal-footer px-0 pb-0 pt-3 border-0">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary" id="expense-submit-btn">Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-danger" id="deleteModalTitle">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-3">
                    <p class="m-0 text-muted">Are you sure you want to delete this expense?</p>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger btn-sm" id="confirm-delete-btn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="data.js"></script> 
    <script src="script.js"></script> 
</body>
</html>
